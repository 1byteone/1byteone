  <text x="1062" y="724" class="label">ops monitor + scheduler</text>

  <rect x="40" y="956" width="1520" height="28" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="58" y="975" class="legend">Animated cyan shows user entry, violet shows orchestration, slate shows RAG retrieval flow, amber shows provider calls, and green shows persisted application state. All path endpoints terminate on explicit box-edge anchors.</text>
</svg>
