  <rect x="1270" y="618" width="250" height="72" rx="12" class="support-fill"/>
  <text x="1395" y="646" class="tag" text-anchor="middle">OPERATIONS</text>
  <text x="1395" y="672" class="name" text-anchor="middle">Spring Boot Admin + SnailJob</text>

  <use href="#p-user-admin" class="flow-cyan"><animate attributeName="stroke-dashoffset" values="0;-36" dur="1.8s" repeatCount="indefinite"/></use>
  <use href="#p-admin-chat" class="flow-cyan"><animate attributeName="stroke-dashoffset" values="0;-36" dur="1.8s" repeatCount="indefinite"/></use>
  <use href="#p-admin-module-bus" class="flow-violet-soft"><animate attributeName="stroke-dashoffset" values="0;-22" dur="2.6s" repeatCount="indefinite"/></use>
  <use href="#p-admin-aiflow" class="flow-violet-soft"/>
  <use href="#p-admin-workflow" class="flow-violet-soft"/>
  <use href="#p-admin-system" class="flow-violet-soft"/>
  <use href="#p-chat-supervisor" class="flow-violet"><animate attributeName="stroke-dashoffset" values="0;-36" dur="1.8s" repeatCount="indefinite"/></use>
  <use href="#p-supervisor-drop" class="flow-violet-soft"><animate attributeName="stroke-dashoffset" values="0;-18" dur="2.2s" repeatCount="indefinite"/></use>
  <use href="#p-supervisor-bus" class="flow-violet-soft"><animate attributeName="stroke-dashoffset" values="0;-18" dur="3.0s" repeatCount="indefinite"/></use>
  <use href="#p-supervisor-skills" class="flow-violet-soft"/>
  <use href="#p-supervisor-web" class="flow-violet-soft"/>
  <use href="#p-supervisor-sql" class="flow-violet-soft"/>
  <use href="#p-supervisor-chart" class="flow-violet-soft"/>
  <use href="#p-chat-embed" class="flow-slate"><animate attributeName="stroke-dashoffset" values="0;-32" dur="2.4s" repeatCount="indefinite"/></use>
  <use href="#p-embed-retrieve" class="flow-slate-short"><animate attributeName="stroke-dashoffset" values="0;-28" dur="2.0s" repeatCount="indefinite"/></use>
  <use href="#p-retrieve-rerank" class="flow-slate-short"><animate attributeName="stroke-dashoffset" values="0;-28" dur="2.0s" repeatCount="indefinite"/></use>
  <use href="#p-rerank-vector" class="flow-slate"><animate attributeName="stroke-dashoffset" values="0;-36" dur="2.2s" repeatCount="indefinite"/></use>
  <use href="#p-rerank-graph" class="flow-slate"><animate attributeName="stroke-dashoffset" values="0;-36" dur="2.2s" repeatCount="indefinite"/></use>
  <use href="#p-supervisor-providers" class="flow-amber"><animate attributeName="stroke-dashoffset" values="0;-36" dur="2.0s" repeatCount="indefinite"/></use>
  <use href="#p-chat-state" class="flow-green-soft"/>
  <use href="#p-aiflow-state" class="flow-green-soft"/>
  <use href="#p-workflow-state" class="flow-green-soft"/>
  <use href="#p-system-state" class="flow-green-soft"/>
  <use href="#p-state-store" class="flow-green"><animate attributeName="stroke-dashoffset" values="0;-40" dur="2.2s" repeatCount="indefinite"/></use>
  <use href="#p-common-support" class="flow-support-faint"><animate attributeName="stroke-dashoffset" values="0;-14" dur="3.0s" repeatCount="indefinite"/></use>
  <use href="#p-ops-support" class="flow-support-faint"><animate attributeName="stroke-dashoffset" values="0;-14" dur="3.0s" repeatCount="indefinite"/></use>

  <g class="signal" fill="#22d3ee">
    <circle r="4"><animateMotion dur="2.0s" repeatCount="indefinite"><mpath href="#p-user-admin"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.0s" repeatCount="indefinite"/></circle>
    <circle r="4"><animateMotion dur="2.0s" begin=".34s" repeatCount="indefinite"><mpath href="#p-admin-chat"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.0s" begin=".34s" repeatCount="indefinite"/></circle>
  </g>
  <g class="signal" fill="#a78bfa">
    <circle r="4"><animateMotion dur="2.0s" begin=".18s" repeatCount="indefinite"><mpath href="#p-chat-supervisor"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.0s" begin=".18s" repeatCount="indefinite"/></circle>
    <circle r="4"><animateMotion dur="2.2s" begin=".54s" repeatCount="indefinite"><mpath href="#p-admin-module-bus"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin=".54s" repeatCount="indefinite"/></circle>
    <circle r="4"><animateMotion dur="2.2s" begin=".96s" repeatCount="indefinite"><mpath href="#p-supervisor-bus"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin=".96s" repeatCount="indefinite"/></circle>
  </g>
  <g class="signal" fill="#94a3b8">
    <circle r="3.8"><animateMotion dur="2.4s" begin=".44s" repeatCount="indefinite"><mpath href="#p-chat-embed"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin=".44s" repeatCount="indefinite"/></circle>
    <circle r="3.8"><animateMotion dur="1.8s" begin=".90s" repeatCount="indefinite"><mpath href="#p-embed-retrieve"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin=".90s" repeatCount="indefinite"/></circle>
    <circle r="3.8"><animateMotion dur="1.8s" begin="1.20s" repeatCount="indefinite"><mpath href="#p-retrieve-rerank"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin="1.20s" repeatCount="indefinite"/></circle>
    <circle r="3.8"><animateMotion dur="2.2s" begin="1.48s" repeatCount="indefinite"><mpath href="#p-rerank-vector"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="1.48s" repeatCount="indefinite"/></circle>
    <circle r="3.8"><animateMotion dur="2.2s" begin="1.78s" repeatCount="indefinite"><mpath href="#p-rerank-graph"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="1.78s" repeatCount="indefinite"/></circle>
  </g>
  <g class="signal" fill="#34d399">
    <circle r="4"><animateMotion dur="2.2s" begin=".44s" repeatCount="indefinite"><mpath href="#p-state-store"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin=".44s" repeatCount="indefinite"/></circle>
  </g>
  <g class="signal" fill="#fbbf24">
    <circle r="4"><animateMotion dur="2.0s" begin=".40s" repeatCount="indefinite"><mpath href="#p-supervisor-providers"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.0s" begin=".40s" repeatCount="indefinite"/></circle>
  </g>

  <text x="250" y="208" class="label">ui request</text>
  <text x="488" y="208" class="label">gateway dispatch</text>
  <text x="790" y="208" class="label">chat request</text>
  <text x="1168" y="208" class="label">model invocation</text>
  <text x="458" y="300" class="label">module dispatch bus</text>
  <text x="968" y="292" class="label">capability bus</text>
  <text x="918" y="600" class="label">document ingest</text>
  <text x="1033" y="570" class="label">retrieval</text>
