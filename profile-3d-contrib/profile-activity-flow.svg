<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500" role="img" aria-labelledby="title desc">
  <title id="title">1byteone engineering activity flow</title>
  <desc id="desc">Animated signals travel from GitHub activity through a Java and AI engineering hub to four open-source projects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1f6feb" stop-opacity=".2"/>
      <stop offset="1" stop-color="#8957e5" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#2ea043" stop-opacity=".3"/>
      <stop offset=".48" stop-color="#58a6ff" stop-opacity=".9"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity=".45"/>
    </linearGradient>
    <linearGradient id="project" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#1c2430"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#8b949e" stroke-opacity=".08"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <path id="inbound" d="M281 216 C345 216 358 216 424 216"/>
    <path id="toRuoyi" d="M856 190 C898 190 894 108 940 108"/>
    <path id="toMewpaw" d="M856 216 C895 216 903 216 940 216"/>
    <path id="toPassage" d="M856 238 C898 238 894 300 940 300"/>
    <path id="toZznursing" d="M856 262 C898 262 894 396 940 396"/>
  </defs>

  <style>
    .label { font-family: "Segoe UI", Arial, sans-serif; }
    .mono { font-family: Consolas, "Courier New", monospace; }
    .rail { fill: none; stroke: url(#rail); stroke-width: 2; stroke-dasharray: 5 9; opacity: .7; }
    .motion { filter: url(#glow); }
    @media (prefers-reduced-motion: reduce) {
      .motion { display: none; }
      .rail { stroke-dasharray: none; opacity: .8; }
    }
  </style>

  <rect width="1280" height="500" rx="12" fill="url(#bg)"/>
  <rect width="1280" height="500" rx="12" fill="url(#grid)"/>
  <rect x="1" y="1" width="1278" height="498" rx="11" fill="none" stroke="#30363d"/>

  <text x="48" y="56" class="mono" font-size="12" font-weight="700" letter-spacing="3" fill="#8b949e">ENGINEERING ACTIVITY FLOW</text>
  <text x="1232" y="56" class="mono" font-size="11" text-anchor="end" fill="#58a6ff">LIVE SIGNALS</text>
  <circle cx="1252" cy="52" r="4" fill="#3fb950">
    <animate attributeName="opacity" values="1;.35;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <path d="M48 74H1232" stroke="#30363d"/>

  <g transform="translate(48 144)">
    <rect width="233" height="144" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="14" y="16" width="48" height="48" rx="7" fill="#238636" fill-opacity=".2" stroke="#3fb950" stroke-opacity=".7"/>
    <path d="M31 33h14v14H31z M48 33h14v14H48z M31 50h14v14H31z M48 50h14v14H48z" fill="#3fb950"/>
    <text x="78" y="37" class="mono" font-size="11" font-weight="700" letter-spacing="1.7" fill="#8b949e">GITHUB ACTIVITY</text>
    <text x="78" y="58" class="label" font-size="16" font-weight="700" fill="#f0f6fc">Contribution signals</text>
    <path d="M16 83H217" stroke="#30363d"/>
    <g transform="translate(16 100)">
      <rect width="12" height="12" rx="2" fill="#1f6feb"/>
      <rect x="17" width="12" height="12" rx="2" fill="#238636"/>
      <rect x="34" width="12" height="12" rx="2" fill="#2ea043"/>
      <rect x="51" width="12" height="12" rx="2" fill="#3fb950"/>
      <rect x="68" width="12" height="12" rx="2" fill="#238636"/>
      <rect x="85" width="12" height="12" rx="2" fill="#2ea043"/>
      <rect x="102" width="12" height="12" rx="2" fill="#3fb950"/>
      <rect x="119" width="12" height="12" rx="2" fill="#238636"/>
      <rect x="136" width="12" height="12" rx="2" fill="#2ea043"/>
      <rect x="153" width="12" height="12" rx="2" fill="#3fb950"/>
      <rect x="170" width="12" height="12" rx="2" fill="#238636"/>
      <rect x="187" width="12" height="12" rx="2" fill="#2ea043"/>
    </g>
    <text x="16" y="133" class="mono" font-size="10.5" fill="#8b949e">COMMIT  ISSUE  REVIEW  RELEASE</text>
  </g>

  <use href="#inbound" class="rail">
    <animate attributeName="stroke-dashoffset" values="0;-28" dur="1.4s" repeatCount="indefinite"/>
  </use>
  <g class="motion" fill="#58a6ff">
    <circle r="4"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#inbound"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle r="3" opacity=".8"><animateMotion dur="1.8s" begin=".6s" repeatCount="indefinite"><mpath href="#inbound"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin=".6s" repeatCount="indefinite"/></circle>
    <circle r="3" opacity=".6"><animateMotion dur="1.8s" begin="1.2s" repeatCount="indefinite"><mpath href="#inbound"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="1.8s" begin="1.2s" repeatCount="indefinite"/></circle>
  </g>

  <g transform="translate(424 126)">
    <rect width="432" height="180" rx="10" fill="url(#hub)" stroke="#58a6ff" stroke-opacity=".55"/>
    <rect x="16" y="16" width="72" height="72" rx="9" fill="#1f6feb" fill-opacity=".18" stroke="#58a6ff" stroke-opacity=".55"/>
    <circle cx="52" cy="52" r="25" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3 5" opacity=".7">
      <animateTransform attributeName="transform" type="rotate" from="0 52 52" to="360 52 52" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="52" r="10" fill="#58a6ff"/>
    <path d="M52 27V18M52 86v-9M27 52h-9M86 52h-9M34 34l-6-6M70 70l6 6M70 34l6-6M34 70l-6 6" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
    <text x="108" y="41" class="mono" font-size="11" font-weight="700" letter-spacing="1.9" fill="#79c0ff">BUILD &amp; ORCHESTRATE</text>
    <text x="108" y="68" class="label" font-size="22" font-weight="700" fill="#f0f6fc">Java Backend + AI Agents</text>
    <text x="108" y="92" class="label" font-size="13" fill="#8b949e">Turn engineering activity into reliable systems.</text>
    <path d="M16 110H416" stroke="#58a6ff" stroke-opacity=".25"/>
    <g class="mono" font-size="11" font-weight="700">
      <text x="16" y="139" fill="#3fb950">SPRING BOOT</text>
      <text x="152" y="139" fill="#58a6ff">STATEGRAPH</text>
      <text x="282" y="139" fill="#a371f7">RAG</text>
    </g>
    <g transform="translate(16 155)">
      <rect width="400" height="8" rx="4" fill="#0d1117"/>
      <rect width="244" height="8" rx="4" fill="#238636"/>
      <rect x="250" width="94" height="8" rx="4" fill="#1f6feb"/>
      <rect x="350" width="50" height="8" rx="4" fill="#8957e5"/>
    </g>
  </g>

  <g>
    <use href="#toRuoyi" class="rail"><animate attributeName="stroke-dashoffset" values="0;-28" dur="1.6s" repeatCount="indefinite"/></use>
    <use href="#toMewpaw" class="rail"><animate attributeName="stroke-dashoffset" values="0;-28" dur="1.6s" repeatCount="indefinite"/></use>
    <use href="#toPassage" class="rail"><animate attributeName="stroke-dashoffset" values="0;-28" dur="1.6s" repeatCount="indefinite"/></use>
    <use href="#toZznursing" class="rail"><animate attributeName="stroke-dashoffset" values="0;-28" dur="1.6s" repeatCount="indefinite"/></use>
  </g>
  <g class="motion" fill="#a371f7">
    <circle r="4"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#toRuoyi"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle r="4"><animateMotion dur="2.2s" begin=".35s" repeatCount="indefinite"><mpath href="#toMewpaw"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin=".35s" repeatCount="indefinite"/></circle>
    <circle r="4"><animateMotion dur="2.2s" begin=".7s" repeatCount="indefinite"><mpath href="#toPassage"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin=".7s" repeatCount="indefinite"/></circle>
    <circle r="4"><animateMotion dur="2.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#toZznursing"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="1.05s" repeatCount="indefinite"/></circle>
  </g>

  <g transform="translate(940 74)">
    <rect width="292" height="68" rx="8" fill="url(#project)" stroke="#30363d"/>
    <rect width="5" height="68" rx="2.5" fill="#3fb950"/>
    <text x="22" y="27" class="mono" font-size="11" font-weight="700" letter-spacing="1.5" fill="#3fb950">OPEN SOURCE PLATFORM</text>
    <text x="22" y="48" class="label" font-size="17" font-weight="700" fill="#f0f6fc">ruoyi-ai</text>
    <text x="22" y="60" class="label" font-size="11.5" fill="#8b949e">Enterprise AI development</text>
    <circle cx="264" cy="34" r="4" fill="#3fb950"><animate attributeName="opacity" values="1;.4;1" dur="2s" repeatCount="indefinite"/></circle>
  </g>
  <g transform="translate(940 170)">
    <rect width="292" height="68" rx="8" fill="url(#project)" stroke="#30363d"/>
    <rect width="5" height="68" rx="2.5" fill="#58a6ff"/>
    <text x="22" y="27" class="mono" font-size="11" font-weight="700" letter-spacing="1.5" fill="#58a6ff">DEVELOPER TOOLING</text>
    <text x="22" y="48" class="label" font-size="17" font-weight="700" fill="#f0f6fc">mewpaw-code</text>
    <text x="22" y="60" class="label" font-size="11.5" fill="#8b949e">Java 21 coding agent</text>
    <circle cx="264" cy="34" r="4" fill="#58a6ff"><animate attributeName="opacity" values="1;.4;1" dur="2s" begin=".35s" repeatCount="indefinite"/></circle>
  </g>
  <g transform="translate(940 266)">
    <rect width="292" height="68" rx="8" fill="url(#project)" stroke="#30363d"/>
    <rect width="5" height="68" rx="2.5" fill="#a371f7"/>
    <text x="22" y="27" class="mono" font-size="11" font-weight="700" letter-spacing="1.5" fill="#a371f7">MULTI-AGENT WORKFLOW</text>
    <text x="22" y="48" class="label" font-size="16" font-weight="700" fill="#f0f6fc">ai-passage-creator</text>
    <text x="22" y="60" class="label" font-size="11.5" fill="#8b949e">Content pipeline</text>
    <circle cx="264" cy="34" r="4" fill="#a371f7"><animate attributeName="opacity" values="1;.4;1" dur="2s" begin=".7s" repeatCount="indefinite"/></circle>
  </g>
  <g transform="translate(940 362)">
    <rect width="292" height="68" rx="8" fill="url(#project)" stroke="#30363d"/>
    <rect width="5" height="68" rx="2.5" fill="#fbbf24"/>
    <text x="22" y="27" class="mono" font-size="11" font-weight="700" letter-spacing="1.5" fill="#fbbf24">HEALTHCARE PLATFORM</text>
    <text x="22" y="48" class="label" font-size="17" font-weight="700" fill="#f0f6fc">zznursing</text>
    <text x="22" y="60" class="label" font-size="11.5" fill="#8b949e">Smart eldercare system</text>
    <circle cx="264" cy="34" r="4" fill="#fbbf24"><animate attributeName="opacity" values="1;.4;1" dur="2s" begin="1.05s" repeatCount="indefinite"/></circle>
  </g>

  <path d="M48 452H1232" stroke="#30363d"/>
  <text x="48" y="476" class="mono" font-size="10.5" font-weight="700" letter-spacing="2" fill="#8b949e">CONTRIBUTION SIGNAL  →  BUILD  →  AUTOMATE  →  SHIP</text>
  <text x="1232" y="476" class="mono" font-size="10.5" text-anchor="end" fill="#8b949e">1BYTEONE / OPEN SOURCE</text>
</svg>
